name: yaxmpp
version: 0.1.0.0
synopsis: Yet another XMPP implementation for Haskell
license: BSD3
author: Nikolay Amiantov
maintainer: ab@fmap.me
category: Network

dependencies:
  - base >= 4.8
  - bytestring
  - text
  - containers
  - vector
  - unliftio-core
  - unliftio
  - exceptions
  - primitive
  - transformers
  - monad-logger
  - xml-types
  - data-default
  - xml-conduit >= 1.5.0
  - attoparsec
  - attoparsec-iso8601
  - base64-bytestring
  - iproute
  - dns
  - conduit
  - conduit-extra
  - crypton-connection
  - network
  - tls
  - stringprep
  - string-interpolate
  - aeson >= 1.0.0.0
  - time
  - uuid
  - text-show
  - crypton
  - random

default-extensions:
  - OverloadedStrings
  - RecordWildCards
  - ExistentialQuantification
  - TupleSections
  - TypeOperators
  - FlexibleInstances
  - RankNTypes
  - PolyKinds
  - QuantifiedConstraints
  - MultiWayIf
  - LambdaCase
  - FlexibleContexts
  - ViewPatterns
  - ScopedTypeVariables
  - KindSignatures
  - DataKinds
  - ConstraintKinds
  - MultiParamTypeClasses
  - GeneralizedNewtypeDeriving
  - NamedFieldPuns
  - DeriveGeneric
  - TemplateHaskell
  - QuasiQuotes
  - TypeFamilies

ghc-options: -Wall

library:
  source-dirs: src

executables:
  irc-bridge:
    main: IRCBridge.hs
    source-dirs: exe
    dependencies:
      - yaxmpp
      - stm
      - stm-conduit
      - yaml
      - irc

  client:
    main: Client.hs
    source-dirs: client
    dependencies:
      - yaxmpp
      - yaml
      - haskeline

tests:
  yaxmpp-test:
    main: Main.hs
    source-dirs: test
    dependencies:
      - yaxmpp
      - tasty
      - tasty-quickcheck
      - QuickCheck
